{{ $color := .color | default "%23c4b5fd" }}
{{ $userId := .userId | default "1209304910" }}
<div class="projet-soundcloud">
  <iframe
    title="Écouter artn0art sur SoundCloud"
    width="100%"
    height="300"
    scrolling="no"
    frameborder="no"
    allow="autoplay"
    loading="lazy"
    src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/users/{{ $userId }}&amp;color={{ $color }}&amp;auto_play=false&amp;hide_related=false&amp;show_comments=true&amp;show_user=true&amp;show_reposts=false&amp;show_teaser=true"></iframe>
  <p class="projet-soundcloud__link">
    Profil complet sur
    <a href="https://soundcloud.com/artn0art" rel="noopener noreferrer" target="_blank">SoundCloud artn0art</a>.
  </p>
</div>
