{{ with .Site.Params.Author.links }}
  <div class="author-links" aria-label="Réseaux sociaux">
    {{ range $links := . }}
      {{ range $name, $url := $links }}
        {{ $isEmail := eq $name "email" }}
        <a
          class="author-links__item{{ if $isEmail }} author-links__item--email{{ end }}"
          href="{{ cond $isEmail "#" ($url | safeURL) }}"
          {{ if eq $name "email" }}
            data-email="{{ $url | base64Encode }}"
          {{ end }}
          target="_blank"
          aria-label="{{ $name | title }}"
          title="{{ $name | title }}"
          rel="me noopener noreferrer"
        >{{ partial "icon.html" $name }}</a>
      {{ end }}
    {{ end }}
  </div>
{{ end }}
