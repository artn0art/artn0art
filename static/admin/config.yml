backend:
  name: github
  repo: artn0art/artn0art
  branch: main
local_backend: true

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages Fixes"
    files:
      - file: "content/_index.md"
        label: "Accueil (Hub)"
        name: "home"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - file: "content/dj/_index.md"
        label: "Page DJ"
        name: "dj"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - file: "content/contact/_index.md"
        label: "Page Contact"
        name: "contact"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
 
  - name: "data"
    label: "Données du Site"
    files:
      - file: "data/profils.yaml"
        label: "Cartes & Profils (Home)"
        name: "profils"
        fields:
          - label: "Cartes en scène (Featured)"
            name: "featured"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Lien de la page (href)", name: "href", widget: "string" }
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Masquer le titre", name: "hideTitle", widget: "boolean", default: true }
              - { label: "Image de couverture", name: "image", widget: "image" }
              - { label: "Statut (badge)", name: "status", widget: "string" }
              - { label: "Lien du statut", name: "statusHref", widget: "string", required: false }
              - { label: "Description courte (max 90 car.)", name: "description", widget: "string" }
              - label: "Tags de liens (facultatif)"
                name: "linkTags"
                widget: "list"
                required: false
                fields:
                  - { label: "Nom du tag", name: "name", widget: "string" }
                  - { label: "Lien URL", name: "url", widget: "string" }
          - label: "Cartes en coulisses (Secondary)"
            name: "secondary"
            widget: "list"
            required: false
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Lien de la page (href)", name: "href", widget: "string" }
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Masquer le titre", name: "hideTitle", widget: "boolean", default: true }
              - { label: "Image de couverture", name: "image", widget: "image" }
              - { label: "Statut (badge)", name: "status", widget: "string" }
              - { label: "Lien du statut", name: "statusHref", widget: "string", required: false }
              - { label: "Description courte (max 90 car.)", name: "description", widget: "string" }
              - label: "Tags de liens (facultatif)"
                name: "linkTags"
                widget: "list"
                required: false
                fields:
                  - { label: "Nom du tag", name: "name", widget: "string" }
                  - { label: "Lien URL", name: "url", widget: "string" }
          - label: "Profils masqués (Pending)"
            name: "pending"
            widget: "list"
            required: false
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Lien de la page (href)", name: "href", widget: "string" }
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Image de couverture", name: "image", widget: "image" }
              - { label: "Statut (badge)", name: "status", widget: "string" }
              - { label: "Description courte (max 90 car.)", name: "description", widget: "string" }
              - label: "Tags de liens (facultatif)"
                name: "linkTags"
                widget: "list"
                required: false
                fields:
                  - { label: "Nom du tag", name: "name", widget: "string" }
                  - { label: "Lien URL", name: "url", widget: "string" }

  - name: "projets"
    label: "Projets & Facettes"
    folder: "content/projets"
    filter: { field: "projetType", value: "project" }
    create: true
    slug: "{{slug}}"
    path: "{{slug}}/index"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Date", name: "date", widget: "date" }
      - label: "Modules (accordéons principaux)"
        name: "modules"
        widget: "list"
        required: false
        fields:
          - { label: "ID (classe couleur : jukbox, crieur…)", name: "id", widget: "string" }
          - { label: "Icône", name: "icon", widget: "image" }
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Sous-titre (tag)", name: "tag", widget: "string" }
          - { label: "Le concept", name: "concept", widget: "text" }
          - { label: "Ambiance", name: "ambiance", widget: "text" }
          - label: "Photos galerie (max 2)"
            name: "photos"
            widget: "list"
            required: false
            max: 2
            fields:
              - { label: "Image", name: "src", widget: "image" }
              - { label: "Texte alternatif", name: "alt", widget: "string" }
      - label: "Sections détaillées (accordéons secondaires)"
        name: "sections"
        widget: "list"
        required: false
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Contenu", name: "body", widget: "markdown" }
      - { label: "Body (texte libre sous les accordéons)", name: "body", widget: "markdown", required: false }
      - { label: "Projet Type", name: "projetType", widget: "hidden", default: "project" }
