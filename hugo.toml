baseURL = "https://artn0art.com/"
locale = "fr"
defaultContentLanguage = "fr"
title = "artn0art"
theme = "blowfish"
enableRobotsTXT = true

# Langues — FR seul (EN du thème Blowfish désactivé)
[languages.fr]
locale = "fr"
label = "Français"
weight = 1
title = "artn0art"

[languages.en]
disabled = true

# Taxonomies
[taxonomies]
  tag = "tags"
  category = "categories"

# Navigation
# Le bouton contact (enveloppe) est contextuel : géré par
# layouts/partials/header/components/cta.html — l'objet de l'email dépend de la
# page active (DJ = booking, projets = devis, autres = prise de contact).
# Plus d'item "contact" ici : le partial rend l'enveloppe lui-même.
[menu]
  # Liens légaux (bas de page)
  [[menu.footer]]
    name = "Mentions légales"
    pageRef = "mentions-legales"
    weight = 10
  [[menu.footer]]
    name = "Confidentialité"
    pageRef = "confidentialite"
    weight = 20

# Blowfish params
[params]
  colorScheme = "ocean"
  defaultAppearance = "light"
  autoSwitchAppearance = false
  enableSearch = false

  [params.homepage]
    layout = "custom"
    homepageImage = ""
    showRecent = false

  [params.article]
    showDate = false
    showReadingTime = false
    showAuthor = false
    showBreadcrumbs = true

  [params.header]
    layout = "basic"
    showTitle = false

  [params.footer]
    showCopyright = true
    showThemeAttribution = false

  [params.author]
    name = "artn0art"
    headline = "DJ · Musicien · Créatif"
    links = [
      { instagram = "https://instagram.com/artn0art" },
      { soundcloud = "https://soundcloud.com/artn0art" },
    ]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
